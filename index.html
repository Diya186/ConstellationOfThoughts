<style>

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {

    --dim: rgba(255,255,255,0.45);
    --dimmer: rgba(255,255,255,0.18);

    cursor: none;
  }

    width:6px; height:6px;

    border-radius:50%;
    pointer-events:none;
    z-index:9999;

    opacity:0.4;
  }

  #three-canvas {
    position:fixed; inset:0;
    z-index:0;
  }

  #hint {
    position:fixed;
    bottom:36px; left:50%;
    transform:translateX(-50%);
    font-family:'Inter', sans-serif;
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--dimmer);
    z-index:5;
    transition:opacity 1.2s ease;
    pointer-events:none;
    white-space:nowrap;

    position:fixed; inset:0;

    align-items:center;

    opacity:0;

  #memory-view.open { pointer-events:auto; }

  #mv-back {
    position:fixed;
    top:32px; left:36px;
    font-family:'Inter', sans-serif;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--dimmer);
    background:none;
    border:none;
    cursor:none;
    padding:8px 0;
    transition:color 0.3s;
    display:flex; align-items:center; gap:10px;
    opacity:0;
    z-index:60;
  }
  #mv-back::before {
    content:'';
    display:block;
    width:24px; height:1px;
    background:currentColor;
    transition:width 0.3s ease;
  }
  #mv-back:hover { color:rgba(255,255,255,0.7); }

    opacity:0;
    flex-shrink:0;

    line-height:1.35;
    max-width:560px;
    margin-bottom:12px;
    opacity:0;
    flex-shrink:0;

  #mv-date {
    font-family:'Inter', sans-serif;
    font-size:11px;

    font-size:15px;

    z-index:10;

    z-index:8;

// ── THREE.JS ──
const canvas3 = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvas3, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x05060e, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const bgGeo = new THREE.BufferGeometry();
const bgCount = 2800;
const bgPos = new Float32Array(bgCount * 3);
const bgSizes = new Float32Array(bgCount);
for (let i=0; i<bgCount; i++) {
  bgPos[i*3]   = (Math.random()-0.5)*80;
  bgPos[i*3+1] = (Math.random()-0.5)*80;
  bgPos[i*3+2] = (Math.random()-0.5)*60 - 10;
  bgSizes[i] = Math.random() * 1.8 + 0.3;
}
bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos,3));
bgGeo.setAttribute('size', new THREE.BufferAttribute(bgSizes,1));

const bgMat = new THREE.ShaderMaterial({
  uniforms: { time:{ value:0 }, uAlpha:{ value:0 } },
  vertexShader:`
    attribute float size;
    uniform float time;
    varying float vA;
    void main() {
      vA = 0.35 + 0.25*sin(time*0.4 + position.x*1.7 + position.y*1.3);
      vec4 mv = modelViewMatrix * vec4(position,1.0);
      gl_PointSize = size * (280.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader:`
    uniform float uAlpha;
    varying float vA;
    void main() {
      float d = length(gl_PointCoord - vec2(0.5));
      if(d>0.5) discard;
      float soft = 1.0 - smoothstep(0.2,0.5,d);
      gl_FragColor = vec4(1.0,1.0,1.0, soft*vA*uAlpha);
    }
  `,
  transparent:true, depthWrite:false
});
const bgStars = new THREE.Points(bgGeo, bgMat);
scene.add(bgStars);

// nebula blobs
function addNebula(x,y,z,r,g,b) {
  const sGeo = new THREE.SphereGeometry(5,16,16);
  const sMat = new THREE.MeshBasicMaterial({ color:new THREE.Color(r,g,b), transparent:true, opacity:0.018, depthWrite:false });
  const mesh = new THREE.Mesh(sGeo,sMat);
  mesh.position.set(x,y,z);
  scene.add(mesh);
}
addNebula(-8,  3, -8,  0.18, 0.08, 0.35);
addNebula( 9, -4, -6,  0.06, 0.10, 0.28);
addNebula( 2,  7, -10, 0.20, 0.06, 0.22);

gsap.to(bgMat.uniforms.uAlpha, { value:1, duration:2.5, ease:'power2.inOut' });

let targetX = 0, targetY = 0, camX = 0, camY = 0;

function threeLoop(t) {
  requestAnimationFrame(threeLoop);
  bgMat.uniforms.time.value = t * 0.001;
  bgStars.rotation.y = t * 0.000025;
  bgStars.rotation.x = t * 0.000012;
  camX += (targetX - camX) * 0.025;
  camY += (targetY - camY) * 0.025;
  camera.position.x = camX * 0.8;
  camera.position.y = camY * 0.5;
  camera.lookAt(0,0,0);
  renderer.render(scene, camera);
}
threeLoop(0);

// ── CONNECTIONS CANVAS ──
const connCanvas = document.getElementById('connections');
const connCtx = connCanvas.getContext('2d');
connCanvas.width = window.innerWidth;
connCanvas.height = window.innerHeight;

const nodes = [], labels = [];

memories.forEach((m, i) => {
  const dot = document.createElement('div');
  dot.className = 'star-node';
  dot.style.left = m.px + 'vw';
  dot.style.top  = m.py + 'vh';
  dot.style.opacity = '0';

  const lbl = document.createElement('div');
  lbl.className = 'star-label';
  lbl.textContent = m.title;
  lbl.style.left = m.px + 'vw';
  lbl.style.top  = m.py + 'vh';
  document.body.appendChild(lbl);

  nodes.push(dot);
  labels.push(lbl);

  gsap.to(dot, { opacity:1, duration:1.2, delay: 1.5 + i*0.15, ease:'power2.out' });

  // breathing
  gsap.to(dot, {
    boxShadow:`0 0 ${6+Math.random()*8}px ${2+Math.random()*4}px rgba(255,255,255,${0.28+Math.random()*0.3})`,
    scale: 1 + Math.random()*0.5,
    duration: 1.8 + Math.random()*2.4,
    repeat:-1, yoyo:true, ease:'sine.inOut',
    delay: Math.random()*3
  });

  // drift
  const dx = (Math.random()-0.5)*12, dy = (Math.random()-0.5)*12;
  gsap.to(dot, { x:dx, y:dy, duration:4+Math.random()*4, repeat:-1, yoyo:true, ease:'sine.inOut', delay:Math.random()*4 });
  gsap.to(lbl, { x:dx, y:dy, duration:4+Math.random()*4, repeat:-1, yoyo:true, ease:'sine.inOut', delay:Math.random()*4 });

  dot.addEventListener('mouseenter', () => {
    cursor.classList.add('hovering');
    gsap.to(dot, { scale:3.5, duration:0.4, ease:'back.out(2)' });
    gsap.to(lbl, { color:'rgba(255,255,255,0.8)', duration:0.35 });
    drawConnections(i);
    connCanvas.classList.add('visible');
  });
  dot.addEventListener('mouseleave', () => {
    cursor.classList.remove('hovering');
    gsap.to(dot, { scale:1, duration:0.4, ease:'power2.out' });
    gsap.to(lbl, { color:'rgba(255,255,255,0)', duration:0.35 });
    connCtx.clearRect(0,0,connCanvas.width,connCanvas.height);
    connCanvas.classList.remove('visible');
  });

  dot.addEventListener('click', () => openMemory(m, i));
});

function getCenter(el) {
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width/2, y: r.top + r.height/2 };
}

function drawConnections(idx) {
  connCtx.clearRect(0,0,connCanvas.width,connCanvas.height);
  const from = getCenter(nodes[idx]);
  const dists = memories.map((_,i) => ({
    i,
    d: Math.hypot(memories[i].px - memories[idx].px, memories[i].py - memories[idx].py)
  })).filter(d=>d.i!==idx).sort((a,b)=>a.d-b.d).slice(0,3);

  dists.forEach(({i}) => {
    const to = getCenter(nodes[i]);
    const grad = connCtx.createLinearGradient(from.x,from.y,to.x,to.y);
    grad.addColorStop(0,'rgba(255,255,255,0.28)');
    grad.addColorStop(1,'rgba(255,255,255,0)');
    connCtx.beginPath();
    connCtx.moveTo(from.x,from.y);
    connCtx.lineTo(to.x,to.y);
    connCtx.strokeStyle = grad;
    connCtx.lineWidth = 0.5;
    connCtx.setLineDash([3,7]);
    connCtx.stroke();
  });
}

// ── SHOOTING STAR ──
function shootingStar() {
  const sx = (Math.random()-0.5)*22, sy = (Math.random()-0.5)*10+4;
  const geo = new THREE.BufferGeometry();
  const arr = new Float32Array([sx,sy,0, sx+2*(Math.random()-0.5),sy-1,0]);
  geo.setAttribute('position', new THREE.BufferAttribute(arr,3));
  const mat = new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:0.75 });
  const line = new THREE.Line(geo,mat);
  scene.add(line);
  let cx=sx, cy=sy;
  gsap.to({}, {
    duration:0.85, ease:'power2.in',
    onUpdate() {
      const p = this.progress();
      arr[0]=cx+(Math.random()-0.5)*0.1; arr[1]=cy-(p*6);
      geo.attributes.position.needsUpdate=true;
    },
    onComplete(){ scene.remove(line); }
  });
  gsap.to(mat, { opacity:0, duration:0.85, ease:'power2.out' });
}
setInterval(shootingStar, 9000 + Math.random()*8000);
setTimeout(shootingStar, 3500);

// ── MEMORY VIEW ──
const mv = document.getElementById('memory-view');
let isOpen = false;

function openMemory(m, idx) {
  if (isOpen) return;
  isOpen = true;

  const fromNode = getCenter(nodes[idx]);

  // ripple
  const ripple = document.createElement('div');
  Object.assign(ripple.style, {
    position:'fixed', left:fromNode.x+'px', top:fromNode.y+'px',
    width:'4px', height:'4px', borderRadius:'50%',
    border:'1px solid rgba(255,255,255,0.5)',
    transform:'translate(-50%,-50%)', pointerEvents:'none', zIndex:'30'
  });
  document.body.appendChild(ripple);
  gsap.to(ripple, { width:'140vmax', height:'140vmax', opacity:0, duration:1.0, ease:'power2.out', onComplete:()=>ripple.remove() });

  gsap.to(nodes, { opacity:0, duration:0.5, stagger:0.03 });
  gsap.to(labels, { color:'rgba(255,255,255,0)', duration:0.4 });
  gsap.to('#hint', { opacity:0, duration:0.4 });
  connCtx.clearRect(0,0,connCanvas.width,connCanvas.height);
  connCanvas.classList.remove('visible');

  document.getElementById('mv-mood').textContent = m.mood;
  document.getElementById('mv-title').textContent = m.title;
  document.getElementById('mv-date').textContent = m.date;
  document.getElementById('mv-text').textContent = '';

  mv.scrollTop = 0;
  mv.classList.add('open');

  const tl = gsap.timeline({ delay:0.3 });
  tl.to(mv,           { opacity:1, duration:0.6, ease:'power2.inOut' })
    .to('#mv-orb',    { opacity:1, scale:1, duration:0.5, ease:'back.out(2)' }, '-=0.1')
    .to('#mv-mood',   { opacity:1, y:0, duration:0.5, ease:'power2.out' }, '-=0.2')
    .to('#mv-title',  { opacity:1, y:0, duration:0.6, ease:'power2.out' }, '-=0.3')
    .to('#mv-date',   { opacity:1, duration:0.4 }, '-=0.3')
    .to('#mv-divider',{ opacity:1, scaleY:1, duration:0.5, ease:'power2.out' }, '-=0.2')
    .call(() => {
      const el = document.getElementById('mv-text');
      el.textContent = m.text;
      gsap.fromTo(el, { opacity:0, y:18 }, { opacity:1, y:0, duration:0.7, ease:'power2.out' });
    }, [], '-=0.1')
    .to('#mv-back',   { opacity:1, duration:0.4 }, '-=0.2');
}



gsap.set('#mv-orb',    { scale:0 });
gsap.set('#mv-mood',   { y:8 });
gsap.set('#mv-title',  { y:12 });
gsap.set('#mv-divider',{ scaleY:0 });
gsap.set('#mv-back',   { opacity:0 });

document.getElementById('mv-back').addEventListener('click', closeMemory);

function closeMemory() {
  const tl = gsap.timeline();
  tl.to('#mv-back',   { opacity:0, duration:0.3 })
    .to(mv,           { opacity:0, duration:0.55, ease:'power2.inOut' }, '-=0.1')
    .call(() => {
      mv.classList.remove('open');
      isOpen = false;
      gsap.set('#mv-orb',    { scale:0, opacity:0 });
      gsap.set('#mv-mood',   { y:8, opacity:0 });
      gsap.set('#mv-title',  { y:12, opacity:0 });
      gsap.set('#mv-date',   { opacity:0 });
      gsap.set('#mv-divider',{ scaleY:0, opacity:0 });
      gsap.set('#mv-text',   { opacity:0 });
    })
    .to(nodes, { opacity:1, duration:0.8, stagger:0.07, ease:'power2.out' })
    .to('#hint', { opacity:1, duration:0.5 }, '-=0.5');
}

// ── CURSOR ──
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  gsap.to(cursor, { x:e.clientX, y:e.clientY, duration:0.08, ease:'none' });
  targetX = (e.clientX/window.innerWidth  - 0.5) * 2;
  targetY = -(e.clientY/window.innerHeight - 0.5) * 2;
});

// ── RESIZE ──
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  connCanvas.width = window.innerWidth;
  connCanvas.height = window.innerHeight;
});

setTimeout(() => gsap.to('#hint', { opacity:0, duration:1.5 }), 9000);
</script>
